openapi: 3.0.0
info:
  title: Shop API
  version: 1.0.0
paths:
  /api/checkout:
    post:
      summary: Create a Stripe Checkout Session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required:
                      - priceId
                      - quantity
                    properties:
                      priceId:
                        type: string
                        description: The Stripe Price ID (price_...)
                      quantity:
                        type: integer
                        minimum: 1
                        maximum: 99
      responses:
        "200":
          description: Session created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId:
                    type: string
                  url:
                    type: string
        "400":
          description: Invalid input
        "500":
          description: Server error

  /api/webhooks/stripe:
    post:
      summary: Stripe Webhook Endpoint
      description: Receives events from Stripe (checkout.session.completed)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Event received
        "400":
          description: Signature verification failed
